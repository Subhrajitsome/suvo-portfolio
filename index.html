<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorboySuvo | Premium 4K Cinematic Edits</title>
    <meta name="description" content="Experience high-octane mass entries and cinematic transitions remastered in 4K by CreatorboySuvo.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { dark: '#0a0a0a', card: '#171717', pink: '#ff0055', purple: '#9d00ff', cyan: '#00f0ff' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; font-family: 'Inter', sans-serif; }
        .neon-text { background: linear-gradient(to right, #ff0055, #9d00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .crunchy-thumb { filter: contrast(1.2) saturate(1.1) brightness(0.9); transition: transform 0.4s ease; }
        .video-card:hover .crunchy-thumb { transform: scale(1.05); }
        .glass-panel { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-white antialiased">

    <header class="fixed w-full top-0 z-50 glass-panel">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <h1 class="font-black text-2xl tracking-tighter uppercase">Creatorboy<span class="text-brand-pink">Suvo</span></h1>
            <a href="https://instagram.com/creatorboysuvo" target="_blank" class="px-6 py-2 rounded-full bg-brand-pink font-bold text-sm hover:scale-105 transition-transform">Follow on Instagram</a>
        </div>
    </header>

    <main class="pt-32 pb-20">
        <section class="max-w-7xl mx-auto px-6 text-center mb-16">
            <h2 class="text-5xl md:text-7xl font-black mb-6 uppercase tracking-tight">Cinematic Edits, <span class="neon-text">Remastered.</span></h2>
            <div id="filter-container" class="flex flex-wrap justify-center gap-3"></div>
        </section>

        <section class="max-w-7xl mx-auto px-6">
            <div id="reels-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <script>
        // ADMIN: ADD YOUR REELS HERE
        const reelsData = [
            { id: 1, title: "Pushpa 2 Mass Entry", category: "South Indian", img: "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800", link: "https://instagram.com/creatorboysuvo" },
            { id: 2, title: "Pathaan Action Edit", category: "Bollywood", img: "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=800", link: "https://instagram.com/creatorboysuvo" }
        ];

        const grid = document.getElementById('reels-grid');
        const filterContainer = document.getElementById('filter-container');

        function render(filter = "All") {
            grid.innerHTML = '';
            reelsData.filter(r => filter === "All" || r.category === filter).forEach(r => {
                const card = document.createElement('div');
                card.className = "video-card cursor-pointer overflow-hidden rounded-xl bg-brand-card border border-white/5";
                card.innerHTML = `
                    <div class="overflow-hidden aspect-[9/16]">
                        <img src="${r.img}" class="crunchy-thumb w-full h-full object-cover">
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-sm truncate">${r.title}</h3>
                        <p class="text-brand-pink text-xs uppercase tracking-widest mt-1">${r.category}</p>
                    </div>
                `;
                card.onclick = () => window.open(r.link, '_blank');
                grid.appendChild(card);
            });
        }

        const cats = ["All", "Bollywood", "South Indian", "Tollywood", "Bengali"];
        cats.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "px-4 py-2 rounded-full text-xs font-bold bg-white/5 hover:bg-brand-pink transition-colors";
            btn.textContent = c;
            btn.onclick = () => render(c);
            filterContainer.appendChild(btn);
        });

        render();
    </script>
</body>
</html>
